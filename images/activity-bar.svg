<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- chip body -->
  <rect x="4" y="4" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.2" fill="none"/>
  <!-- left pins -->
  <line x1="4" y1="6"  x2="2" y2="6"  stroke="currentColor" stroke-width="1"/>
  <line x1="4" y1="8"  x2="2" y2="8"  stroke="currentColor" stroke-width="1"/>
  <line x1="4" y1="10" x2="2" y2="10" stroke="currentColor" stroke-width="1"/>
  <!-- right pins -->
  <line x1="12" y1="6"  x2="14" y2="6"  stroke="currentColor" stroke-width="1"/>
  <line x1="12" y1="8"  x2="14" y2="8"  stroke="currentColor" stroke-width="1"/>
  <line x1="12" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="1"/>
  <!-- Z label -->
  <text x="5.5" y="10.5" font-family="monospace" font-size="5" font-weight="bold" fill="currentColor">Z</text>
</svg>
